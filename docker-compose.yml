# WARNING: DEVELOPMENT ONLY — Do NOT use this file in production.
# For production deployment, use docker-compose.prod.yml with .env.prod.example.
# This file exposes Mailpit (email trap) and MinIO with default credentials
# that are NOT secure for public-facing deployments.
#
# NOTE: BETTER_AUTH_SECRET, POSTGRES_PASSWORD, and REDIS_PASSWORD must be set
# in your .env file (or shell) before running `docker compose up`. There are
# no defaults — leaving any of them empty is intentionally a hard failure on
# Postgres/Redis startup so a production deploy cannot ship with stub creds.
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: clauseflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # Optional auth: set REDIS_PASSWORD in .env to enable. If unset Redis runs
    # without auth (unchanged behavior for local dev).
    command: ["sh", "-c", "if [ -n \"$REDIS_PASSWORD\" ]; then redis-server --requirepass \"$REDIS_PASSWORD\"; else redis-server; fi"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    restart: unless-stopped

  # DEV ONLY: Default credentials (minioadmin/minioadmin) — change before any public deployment.
  # In production use docker-compose.prod.yml and supply real credentials via .env.
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped

  # Creates the storage bucket on first boot — exits immediately after.
  createbuckets:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do
        echo 'waiting for MinIO...'; sleep 1;
      done;
      /usr/bin/mc mb local/clauseflow --ignore-existing;
      exit 0;
      "
    restart: "no"

  # DEV ONLY: Mailpit catches all outgoing emails (visible at http://localhost:8025).
  # Never expose port 8025 publicly — it shows all email content in plaintext.
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"   # web UI — open http://localhost:8025 to read caught emails
      - "1025:1025"   # SMTP — app/worker send here
    restart: unless-stopped

  docuseal:
    image: docuseal/docuseal:latest
    ports:
      - "3001:3000"
    volumes:
      - docusealdata:/data
    environment:
      SECRET_KEY_BASE: "${DOCUSEAL_SECRET_KEY_BASE:?DOCUSEAL_SECRET_KEY_BASE must be set in .env (generate with openssl rand -hex 64)}"
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/clauseflow
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set in .env (generate with: openssl rand -base64 32)}"
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_BUCKET: clauseflow
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_REGION: us-east-1
      # AI provider — read from .env at project root (all optional, features degrade gracefully)
      AI_PROVIDER: ${AI_PROVIDER:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
      # Email alerts (optional) — also read from .env
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@clauseflow.io}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-}
      # M5 Notification encryption (required for Slack/Teams/webhook routing)
      NOTIFICATION_ENCRYPTION_KEY: "${NOTIFICATION_ENCRYPTION_KEY:?NOTIFICATION_ENCRYPTION_KEY must be set in .env}"
      # E-signature (DocuSeal)
      DOCUSEAL_API_URL: ${DOCUSEAL_API_URL:-http://docuseal:3000}
      DOCUSEAL_API_KEY: ${DOCUSEAL_API_KEY:-}
      DOCUSEAL_WEBHOOK_SECRET: ${DOCUSEAL_WEBHOOK_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      createbuckets:
        condition: service_completed_successfully
      mailpit:
        condition: service_started
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.worker
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/clauseflow
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_BUCKET: clauseflow
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_REGION: us-east-1
      # AI provider — read from .env at project root
      AI_PROVIDER: ${AI_PROVIDER:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
      # Email alerts (optional)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@clauseflow.io}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-}
      # M5 Notification encryption (required for Slack/Teams/webhook routing)
      NOTIFICATION_ENCRYPTION_KEY: "${NOTIFICATION_ENCRYPTION_KEY:?NOTIFICATION_ENCRYPTION_KEY must be set in .env}"
      # E-signature (DocuSeal)
      DOCUSEAL_API_URL: ${DOCUSEAL_API_URL:-http://docuseal:3000}
      DOCUSEAL_API_KEY: ${DOCUSEAL_API_KEY:-}
      DOCUSEAL_WEBHOOK_SECRET: ${DOCUSEAL_WEBHOOK_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      mailpit:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
  docusealdata:

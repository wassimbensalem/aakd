services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: clauseflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9011"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata_dev:/data
    ports:
      - "9010:9000"
      - "9011:9011"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  # Dev MinIO uses port 9010 (mapped 9010→9000 inside container)
  createbuckets:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do
        echo 'waiting for MinIO...'; sleep 1;
      done;
      /usr/bin/mc mb local/clauseflow --ignore-existing;
      exit 0;
      "
    restart: "no"

volumes:
  pgdata_dev:
  miniodata_dev:
